services:
  kurrentdb:
    image: docker.eventstore.com/kurrent-latest/kurrentdb:latest
    container_name: agilepm-kurrentdb
    environment:
      KURRENTDB_CLUSTER_SIZE: "1"
      KURRENTDB_RUN_PROJECTIONS: "All"
      KURRENTDB_START_STANDARD_PROJECTIONS: "true"
      KURRENTDB_INSECURE: "true"
      KURRENTDB_ENABLE_ATOM_PUB_OVER_HTTP: "true"
    ports:
      - "2113:2113"
      - "1113:1113"
    volumes:
      - kurrentdb-data:/var/lib/kurrentdb
      - kurrentdb-logs:/var/log/kurrentdb

  agilepm-api:
    build:
      context: ../../
      dockerfile: infraestructura/docker/Dockerfile
    container_name: agilepm-api
    depends_on:
      - kurrentdb
    environment:
      KURRENTDB_CONNECTION_STRING: kurrentdb://kurrentdb:2113?tls=false
    ports:
      - "8080:8080"

volumes:
  kurrentdb-data:
  kurrentdb-logs:
